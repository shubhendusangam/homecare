<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>New Booking Assignment</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #7C3AED; color: #fff; padding: 24px 32px; }
        .header h1 { margin: 0; font-size: 22px; }
        .content { padding: 32px; color: #333; line-height: 1.6; }
        .detail { background: #F9FAFB; border-radius: 8px; padding: 16px; margin: 16px 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .label { color: #6B7280; font-size: 14px; }
        .value { font-weight: 600; font-size: 14px; }
        .cta { display: inline-block; background: #7C3AED; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin-top: 16px; }
        .footer { padding: 20px 32px; text-align: center; color: #9CA3AF; font-size: 12px; border-top: 1px solid #E5E7EB; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>New Booking Assigned 📋</h1>
    </div>
    <div class="content">
        <p>Hi <span th:text="${userName}">Helper</span>,</p>
        <p>You've been assigned a new booking! Here are the details:</p>
        <div class="detail">
            <div class="detail-row"><span class="label">Booking ID</span><span class="value" th:text="${bookingId}">—</span></div>
            <div class="detail-row"><span class="label">Service</span><span class="value" th:text="${serviceType}">—</span></div>
            <div class="detail-row"><span class="label">Address</span><span class="value" th:text="${address}">—</span></div>
            <div class="detail-row"><span class="label">Duration</span><span class="value" th:text="${duration}">—</span></div>
        </div>
        <p>Please make sure to arrive on time. The customer is counting on you!</p>
    </div>
    <div class="footer">
        <p>HomeCare — Quality home services at your doorstep</p>
    </div>
</div>
</body>
</html>
