<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Helper Assigned</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #059669; color: #fff; padding: 24px 32px; }
        .header h1 { margin: 0; font-size: 22px; }
        .content { padding: 32px; color: #333; line-height: 1.6; }
        .helper-card { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 8px; padding: 16px; margin: 16px 0; text-align: center; }
        .helper-name { font-size: 18px; font-weight: 700; color: #059669; }
        .helper-rating { color: #F59E0B; font-size: 16px; margin-top: 4px; }
        .detail { background: #F9FAFB; border-radius: 8px; padding: 16px; margin: 16px 0; }
        .detail-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .label { color: #6B7280; font-size: 14px; }
        .value { font-weight: 600; font-size: 14px; }
        .footer { padding: 20px 32px; text-align: center; color: #9CA3AF; font-size: 12px; border-top: 1px solid #E5E7EB; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Helper Assigned 👤</h1>
    </div>
    <div class="content">
        <p>Hi <span th:text="${userName}">User</span>,</p>
        <p>Great news! A helper has been assigned to your booking.</p>
        <div class="helper-card">
            <div class="helper-name" th:text="${helperName}">Helper Name</div>
            <div class="helper-rating">★ <span th:text="${helperRating}">4.5</span></div>
        </div>
        <div class="detail">
            <div class="detail-row"><span class="label">Booking ID</span><span class="value" th:text="${bookingId}">—</span></div>
            <div class="detail-row"><span class="label">Service</span><span class="value" th:text="${serviceType}">—</span></div>
        </div>
        <p>Your helper will arrive at the scheduled time. You can track their location in real-time.</p>
    </div>
    <div class="footer">
        <p>HomeCare — Quality home services at your doorstep</p>
    </div>
</div>
</body>
</html>
